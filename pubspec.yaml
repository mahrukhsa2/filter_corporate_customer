name: filter_corporate_customer
description: Corporate Customer Portal for Filter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.0.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  http: ^1.6.0
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  share_plus: ^12.0.1
  excel: ^4.0.6
  pdf: ^3.11.0
  printing: ^5.12.0
  open_filex: ^4.3.4
  path_provider: ^2.1.2
dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"  # your icon file
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts: []
